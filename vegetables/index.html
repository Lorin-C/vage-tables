<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
陈老四蔬菜单
</title>


<link rel="stylesheet" href="/static/style.css">


</head>


<body>


<div class="box">


<h2>
陈老四蔬菜批发
</h2>



<form action="/api/generate" method="post">



<label>
客户名称（最多6个字，可不填）
</label>


<input
type="text"
name="customer"
maxlength="6"
placeholder="请输入客户名称"
/>



<label>
菜品列表（每行一个）
</label>


<textarea

name="dishes"

placeholder="
白菜
土豆
西红柿
"

></textarea>



<button type="submit">

生成订单

</button>


</form>


</div>


</body>

</html>
